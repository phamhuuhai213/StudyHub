<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
  <title>Cài đặt tài khoản</title>
  <link th:href="@{/css/auth.css}" rel="stylesheet" />
  <style>
    /* CSS cho ảnh bìa preview */
    .cover-photo-preview {
      height: 200px;
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 8px;
      margin-bottom: 10px;
      background-size: cover;
      background-position: center;
      border: 2px dashed #ccc;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    .profile-edit-card {
      border-radius: 24px !important;
      border: 1px solid rgba(226, 232, 240, 0.8) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
      overflow: hidden;
      background: #ffffff;
    }
    .profile-edit-header {
      background-color: #fbfbfa !important;
      border-bottom: 1px solid #e2e8f0 !important;
      border-radius: 24px 24px 0 0 !important;
      padding: 35px 20px !important;
    }
    .profile-edit-header h2 {
      color: #0f172a !important;
      font-weight: 700 !important;
    }
    .profile-edit-header p {
      color: #64748b !important;
    }
    .profile-icon-plate {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      background: rgba(99, 102, 241, 0.08);
      border-radius: 50%;
      color: var(--primary-color);
    }
    .btn-change-password {
      border-radius: 12px !important;
      font-weight: 600 !important;
      border: 1.5px solid #ef4444 !important;
      color: #ef4444 !important;
      background: transparent !important;
      transition: all 0.2s ease !important;
      padding: 12px 20px !important;
    }
    .btn-change-password:hover {
      background: #fef2f2 !important;
      color: #dc2626 !important;
      transform: translateY(-1px);
    }
    .btn-save-profile {
      border-radius: 12px !important;
      font-weight: 600 !important;
      border: 1.5px solid #3b82f6 !important;
      color: #3b82f6 !important;
      background: transparent !important;
      transition: all 0.2s ease !important;
      padding: 12px 20px !important;
    }
    .btn-save-profile:hover {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div layout:fragment="content">

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">

                <div class="card profile-edit-card border-0">

                    <!-- Header -->
                    <div class="card-header profile-edit-header text-center">
                        <div class="profile-icon-plate">⚙️</div>
                        <h2 class="mb-1 fw-bold">Cài đặt tài khoản</h2>
                        <p class="mb-0">Cập nhật thông tin cá nhân và profile của bạn</p>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-4 p-md-5">

                        <!-- Success/Error Messages -->
                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                            ✅ <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            ❌ <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Form -->
                        <form th:action="@{/profile/edit}"
                              th:object="${profileDto}"
                              method="POST"
                              enctype="multipart/form-data">

                            <!-- Ảnh bìa hiện tại -->
                            <div class="mb-4 text-center">
                                <label class="form-label fw-bold text-muted mb-2">📷 Ảnh bìa hiện tại</label>
                                <div class="cover-photo-preview"
                                     th:style="${currentCoverPhotoUrl != null} ?
                     'background-image: url(' + @{/view-file/{fileName}(fileName=${currentCoverPhotoUrl})} + ')' :
                     'background-color: #e9ecef;'">
                                </div>
                            </div>

                            <!-- Upload ảnh bìa mới -->
                            <div class="mb-4">
                                <label for="coverPhotoFile" class="form-label fw-bold">
                                    🖼️ Tải lên ảnh bìa mới
                                </label>
                                <input type="file"
                                       class="form-control"
                                       id="coverPhotoFile"
                                       th:field="*{coverPhotoFile}"
                                       accept="image/png, image/jpeg, image/gif"
                                       style="border-radius: 10px;">
                                <small class="form-text text-muted">Định dạng: PNG, JPG, GIF. Kích thước đề xuất: 1200x400px</small>
                            </div>

                            <hr class="my-4">

                            <!-- Avatar hiện tại -->
                            <div class="mb-4 text-center">
                                <label class="form-label fw-bold text-muted mb-3">👤 Avatar hiện tại</label>
                                <div>
                                    <img th:if="${currentAvatarUrl != null}"
                                         th:src="@{/view-file/{fileName}(fileName=${currentAvatarUrl})}"
                                         alt="Avatar"
                                         style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #667eea; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                                    <div th:if="${currentAvatarUrl == null}"
                                         style="width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 60px; font-weight: bold; border: 4px solid #667eea; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                                        👤
                                    </div>
                                </div>
                            </div>

                            <!-- Upload avatar mới -->
                            <div class="mb-4">
                                <label for="avatarFile" class="form-label fw-bold">
                                    📸 Tải lên avatar mới
                                </label>
                                <input type="file"
                                       class="form-control"
                                       id="avatarFile"
                                       th:field="*{avatarFile}"
                                       accept="image/png, image/jpeg, image/gif"
                                       style="border-radius: 10px;">
                                <small class="form-text text-muted">Định dạng: PNG, JPG, GIF. Kích thước đề xuất: 400x400px</small>
                            </div>

                            <hr class="my-4">

                            <!-- Thông tin cá nhân -->
                            <h5 class="mb-3 fw-bold text-primary">📝 Thông tin cá nhân</h5>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" required style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="userType" class="form-label fw-bold">Vai trò</label>
                                    <select class="form-select" id="userType" th:field="*{userType}" style="border-radius: 10px;">
                                        <option value="">-- Chọn vai trò --</option>
                                        <option th:each="type : ${userTypes}"
                                                th:value="${type}"
                                                th:text="${type.displayName}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="school" class="form-label fw-bold">Trường học</label>
                                    <input type="text" class="form-control" id="school" th:field="*{school}"
                                           placeholder="VD: Đại học Bách khoa Đà Nẵng" style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="major" class="form-label fw-bold">Chuyên ngành</label>
                                    <input type="text" class="form-control" id="major" th:field="*{major}"
                                           placeholder="VD: Công nghệ phần mềm" style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="location" class="form-label fw-bold">Sống ở</label>
                                    <input type="text" class="form-control" id="location" th:field="*{location}"
                                           placeholder="VD: Đà Nẵng" style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="hometown" class="form-label fw-bold">Đến từ</label>
                                    <input type="text" class="form-control" id="hometown" th:field="*{hometown}"
                                           placeholder="VD: Huế" style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="birthday" class="form-label fw-bold">Ngày sinh</label>
                                    <input type="date" class="form-control" id="birthday" th:field="*{birthday}" style="border-radius: 10px;">
                                </div>

                                <div class="col-md-6">
                                    <label for="contactPhone" class="form-label fw-bold">Số điện thoại</label>
                                    <input type="tel" class="form-control" id="contactPhone" th:field="*{contactPhone}"
                                           placeholder="VD: 0905123456" style="border-radius: 10px;">
                                </div>

                                <div class="col-12">
                                    <label for="bio" class="form-label fw-bold">Tiểu sử (Bio)</label>
                                    <textarea class="form-control" id="bio" th:field="*{bio}" rows="4"
                                              placeholder="Viết gì đó về bạn..." style="border-radius: 10px;"></textarea>
                                </div>
                            </div>
                            <hr class="my-4">

                            <!-- Action Buttons -->
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <a th:href="@{/profile/change-password}"
                                       class="btn btn-change-password w-100">
                                        🔒 Đổi mật khẩu
                                    </a>
                                </div>
                                <div class="col-sm-6">
                                    <button type="submit" class="btn btn-save-profile w-100 fw-bold">
                                        💾 Lưu thay đổi
                                    </button>
                                </div>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

<style>
    .cover-photo-preview {
        height: 200px;
        width: 100%;
        background-color: #e9ecef;
        border-radius: 15px;
        background-size: cover;
        background-position: center;
        border: 3px dashed #dee2e6;
        position: relative;
    }

    .cover-photo-preview::after {
        content: '🖼️ Ảnh bìa';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.2rem;
        color: #6c757d;
        font-weight: bold;
        opacity: 0.5;
    }

    .cover-photo-preview[style*="background-image"]::after {
        display: none;
    }
</style>

</div>
</body>
</html>
