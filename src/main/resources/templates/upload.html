<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Đăng tải tài liệu</title>
    <link th:href="@{/css/upload.css}" rel="stylesheet" />
    <style>
        /* --- UPLOAD PAGE CARD STYLE (giống post-edit) --- */
        .upload-card {
            border-radius: 24px !important;
            border: 1px solid rgba(226, 232, 240, 0.8) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
            overflow: hidden;
            background: #ffffff;
            max-width: 860px;
            margin: 40px auto;
        }
        .upload-card-header {
            background-color: #fbfbfa !important;
            border-bottom: 1px solid #e2e8f0 !important;
            border-radius: 24px 24px 0 0 !important;
            padding: 35px 20px !important;
            text-align: center;
        }
        .upload-card-header h2 {
            color: #0f172a !important;
            font-weight: 700 !important;
            font-size: 1.75rem;
            margin-bottom: 6px;
        }
        .upload-card-header p {
            color: #64748b !important;
            margin: 0;
        }
        .upload-icon-plate {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 50%;
        }
        .upload-card-body {
            padding: 40px 48px;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
            font-size: 1rem;
        }
        .form-control {
            border-radius: 10px !important;
            border: 1px solid #d1d5db !important;
            padding: 12px 16px !important;
            font-size: 1rem !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
        }
        .form-control:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12) !important;
        }
        textarea.form-control { min-height: 120px; }
        /* Buttons */
        .btn-cancel-upload {
            border-radius: 12px !important;
            font-weight: 600 !important;
            border: 1.5px solid #ef4444 !important;
            color: #ef4444 !important;
            background: transparent !important;
            transition: all 0.2s ease !important;
            padding: 12px 20px !important;
            text-align: center !important;
            text-decoration: none !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .btn-cancel-upload:hover {
            background: #fef2f2 !important;
            color: #dc2626 !important;
            transform: translateY(-1px) !important;
            text-decoration: none !important;
        }
        .btn-upload-submit {
            border-radius: 12px !important;
            font-weight: 600 !important;
            border: 1.5px solid #3b82f6 !important;
            color: #3b82f6 !important;
            background: transparent !important;
            transition: all 0.2s ease !important;
            padding: 12px 20px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .btn-upload-submit:hover {
            background: #eff6ff !important;
            color: #1d4ed8 !important;
            transform: translateY(-1px) !important;
        }
        .btn-upload-submit:disabled {
            opacity: 0.6 !important;
            cursor: not-allowed !important;
            transform: none !important;
        }
    </style>
</head>
<body>

<div layout:fragment="content">

    <div class="upload-card">

        <!-- Header -->
        <div class="upload-card-header">
            <div class="upload-icon-plate">📤</div>
            <h2>Đăng tải tài liệu</h2>
            <p>Chia sẻ kiến thức của bạn với cộng đồng học tập</p>
        </div>

        <div class="upload-card-body">

        <form th:action="@{/posts/create}"
              th:object="${postDto}"
              method="POST"
              enctype="multipart/form-data"
              id="uploadForm">

            <div class="file-upload-zone" id="dropZone">
                <div class="file-icon-big">📁</div>
                <h4>Kéo thả file vào đây</h4>
                <p>hoặc <strong>bấm để chọn file từ máy tính</strong></p>
                <small style="color: #999;">Hỗ trợ: PDF, Word, Excel, PowerPoint, TXT (Max 50MB)</small>
                <input type="file"
                       id="fileInput"
                       th:field="*{files}"
                       accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt"
                       style="display: none;"
                       multiple
                       required>
            </div>

            <div class="file-selected" id="fileSelected">
                <div class="file-preview-icon" id="fileIcon">📄</div>
                <div class="file-info">
                    <h5 id="fileName">file.pdf</h5>
                    <small id="fileSize">0 MB</small>
                </div>
                <button type="button" class="btn btn-danger" onclick="clearFile()" style="margin-left: auto;">
                    ❌ Xóa
                </button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>📝 Tiêu đề tài liệu <span>*</span></label>
                    <input type="text"
                           class="form-control"
                           th:field="*{title}"
                           placeholder="VD: Giáo trình Lập trình Java cơ bản"
                           required>
                </div>
                <div class="form-group">
                    <label>🏷️ Tags (từ khóa)</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{tags}"
                           placeholder="VD: java, spring, backend">
                    <div class="tag-hint">
                        💡 Phân cách bằng dấu phẩy
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>📄 Mô tả chi tiết</label>
                <textarea class="form-control"
                          th:field="*{description}"
                          placeholder="Mô tả nội dung, đối tượng phù hợp, kiến thức cần có..."></textarea>
            </div>

            <div class="form-group">
                <label>📂 Chọn danh mục <span>*</span></label>
                <div class="category-grid">
                    <div class="category-item" th:each="cat : ${categories}">
                        <input type="radio"
                               th:id="${'cat_' + cat.id}"
                               name="categoryId"
                               th:value="${cat.id}"
                               required>
                        <label th:for="${'cat_' + cat.id}" class="category-label">
                            <span class="category-icon" th:text="${cat.icon}">📚</span>
                            <span class="category-name" th:text="${cat.name}">Category</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>🔒 Quyền riêng tư</label>
                <label class="privacy-option">
                    <input type="radio" name="isPublic" value="true" checked>
                    <div class="privacy-label">
                        <strong>🌐 Công khai</strong><br>
                        <small>Mọi người đều có thể xem và tải xuống</small>
                    </div>
                </label>
                <label class="privacy-option">
                    <input type="radio" name="isPublic" value="false">
                    <div class="privacy-label">
                        <strong>🔒 Riêng tư</strong><br>
                        <small>Chỉ mình tôi có thể xem</small>
                    </div>
                </label>
            </div>

            <!-- Button đăng tải -->
            <div class="row g-3 mt-2">
                <div class="col-12">
                    <button type="submit" class="btn-upload-submit w-100 fw-bold" id="submitBtn">
                        🚀 Đăng tải ngay
                    </button>
                </div>
            </div>

        </form>

        </div><!-- end upload-card-body -->

    </div><!-- end upload-card -->

</div>
<script layout:fragment="scripts">
    { // <--- BẮT ĐẦU BLOCK SCOPE (Giúp tránh trùng tên biến với chatjs)

        // === 1. KHAI BÁO BIẾN ===
        const uploadDropZone = document.getElementById('dropZone');
        const uploadFileInput = document.getElementById('fileInput');
        const uploadFileSelected = document.getElementById('fileSelected');
        const uploadFileName = document.getElementById('fileName');
        const uploadFileSize = document.getElementById('fileSize');
        const uploadFileIcon = document.getElementById('fileIcon');
        const descInput = document.querySelector('textarea[name="description"]');
        const contentInput = document.getElementById('hiddenContent');

        // === 2. XỬ LÝ SỰ KIỆN CHỌN FILE ===
        if (uploadDropZone) {
            uploadDropZone.addEventListener('click', () => uploadFileInput.click());

            uploadDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadDropZone.classList.add('dragover');
            });

            uploadDropZone.addEventListener('dragleave', () => {
                uploadDropZone.classList.remove('dragover');
            });

            uploadDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadDropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    uploadFileInput.files = e.dataTransfer.files;
                    handleFiles();
                }
            });
        }

        if (uploadFileInput) {
            uploadFileInput.addEventListener('change', handleFiles);
        }

        function handleFiles() {
            const files = uploadFileInput.files;
            if (files.length > 0) {
                const file = files[0];
                if (uploadFileName) uploadFileName.textContent = file.name;
                if (uploadFileSize) uploadFileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';

                // Icon đơn giản
                if (uploadFileIcon) {
                    if (file.type.includes('pdf')) uploadFileIcon.textContent = '📄';
                    else if (file.type.includes('word')) uploadFileIcon.textContent = '📝';
                    else uploadFileIcon.textContent = '📁';
                }

                if (uploadFileSelected) uploadFileSelected.classList.add('show');
                if (uploadDropZone) uploadDropZone.style.display = 'none';

                // Tự động điền tiêu đề nếu trống
                const titleInput = document.querySelector('input[name="title"]');
                if (titleInput && !titleInput.value) {
                    titleInput.value = file.name.replace(/\.[^/.]+$/, "");
                }
            }
        }

        // Hàm global để nút Xóa gọi được (gán vào window)
        window.clearFile = function() {
            if (uploadFileInput) uploadFileInput.value = '';
            if (uploadFileSelected) uploadFileSelected.classList.remove('show');
            if (uploadDropZone) uploadDropZone.style.display = 'block';
        };

        // === 3. XỬ LÝ SUBMIT FORM ===
        const uploadForm = document.getElementById('uploadForm');
        if (uploadForm) {
            uploadForm.addEventListener('submit', function(e) {
                // 3.1. Validate Tiêu đề
                const titleInput = document.querySelector('input[name="title"]');
                if (titleInput && !titleInput.value.trim()) {
                    e.preventDefault();
                    alert("Vui lòng nhập tiêu đề tài liệu!");
                    titleInput.focus();
                    return;
                }

                // 3.2. Validate File
                if (uploadFileInput && uploadFileInput.files.length === 0) {
                    e.preventDefault();
                    alert("Vui lòng chọn file để tải lên!");
                    return;
                }

                // 3.3. Validate Danh mục
                const categoryInput = document.querySelector('input[name="categoryId"]:checked');
                if (!categoryInput) {
                    e.preventDefault();
                    alert("Vui lòng chọn danh mục!");
                    return;
                }

                // 3.4. Sync Description
                if(descInput && contentInput) {
                    contentInput.value = descInput.value;
                }

                // 3.5. Disable nút submit
                const btn = document.getElementById('submitBtn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '⏳ Đang tải lên...';
                }
            });
        }

    } // <--- KẾT THÚC BLOCK SCOPE
</script>

</body>
</html>
